<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX.com - Install Client</title>
    <style>
        body { background-color: #E1E1E1; font-family: Verdana, sans-serif; margin: 0; padding: 0; }
        .top-header { background-color: #000; color: #FFF; padding: 6px 10px; display: flex; justify-content: flex-end; font-size: 11px; }
        .top-header a { color: #FFF; text-decoration: none; }
        .main-banner { background-color: #000080; padding: 10px; border-bottom: 3px solid #E1E1E1; }
        .nav-bar { background-color: #ECECEC; border-top: 1px solid #FFF; border-bottom: 1px solid #A0A0A0; padding: 8px 15px; display: flex; gap: 20px; font-weight: bold; font-size: 13px; }
        .nav-bar a { color: #002E62; text-decoration: none; }
        
        .main-layout { padding: 30px; background-color: #FFF; margin: 10px; border: 1px solid #A0A0A0; text-align: center; min-height: 400px; }
        
        .download-box { border: 1px dashed #FF0000; padding: 25px; background: #FFFFAA; display: inline-block; width: 90%; max-width: 520px; box-shadow: 3px 3px 0px #999; }
        
        .dl-btn { background: #008000; color: white; border: 2px solid #004000; padding: 12px 25px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0px #000; }
        .update-btn { background: #FF8000; color: white; border: 2px solid #CC6600; padding: 12px 25px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0px #000; }

        /* Estilo instalador XP */
        .installer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; }
        .installer-window { background: #ECE9D8; border: 2px solid #0054E3; width: 400px; padding: 15px; box-shadow: 4px 4px 10px #000; text-align: left; }
        .installer-title { background: linear-gradient(to right, #0054E3, #267DFF); color: white; padding: 5px; font-weight: bold; margin: -15px -15px 15px -15px; }
        .progress-container { background: white; border: 1px solid #7F9DB9; height: 20px; width: 100%; margin: 15px 0; }
        .progress-bar { background: #30FA30; height: 100%; width: 0%; transition: width 0.1s; }
        .installer-logs { font-family: monospace; font-size: 10px; background: #FFF; border: 1px solid #7F9DB9; padding: 5px; height: 60px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="top-header"><a href="index.html">Home</a></div>
    <div class="main-banner"><h1 style="color:white; margin:0; font-style:italic;">ROBLOX</h1></div>
    <div class="nav-bar">
        <a href="index.html">Home</a>
        <a href="maintenance.html">Games</a>
        <a href="install.html">Install</a>
    </div>

    <div class="main-layout">
        <div class="download-box">
            <h2 id="install-title">Install ROBLOX Client</h2>
            <p id="install-desc">Para construir e jogar, instale o cliente legacy de 2006.</p>
            <div id="app-status" style="margin: 15px 0; font-weight: bold;">Status: Aguardando...</div>
            <button id="action-btn" class="dl-btn" onclick="iniciarInstalacao()">Download Now</button>
        </div>
    </div>

    <div id="installer-screen" class="installer-overlay">
        <div class="installer-window">
            <div class="installer-title">ROBLOX Setup Wizard</div>
            <p id="installer-current-action">Iniciando...</p>
            <div class="progress-container"><div id="setup-progress" class="progress-bar"></div></div>
            <div id="setup-logs" class="installer-logs"></div>
        </div>
    </div>

    <script>
        // Nome padrão para PC
        let nomeDoSetupParaBaixar = "RobloxPlayer2006PC.exe";
        let isMobile = false;

        function atualizarUI() {
            const instalado = localStorage.getItem('roblox_installed') === 'true';
            const btn = document.getElementById('action-btn');
            const status = document.getElementById('app-status');

            // Detecção de Mobile (Android, iPhone, etc)
            if (/Mobi|Android|iPhone|iPad|Tablet/i.test(navigator.userAgent)) {
                isMobile = true;
                // Usa o arquivo APK que você enviou
                nomeDoSetupParaBaixar = "app4040958-mqdtiz.apk";
                document.getElementById('install-desc').innerText = "Versão Mobile detectada. Baixe o APK para jogar no seu dispositivo.";
            }

            if (instalado) {
                document.getElementById('install-title').innerText = "Cliente Instalado";
                status.innerHTML = "Status: <span style='color:green'>✓ Pronto para jogar</span>";
                btn.innerText = "Check Updates";
                btn.className = "update-btn";
                btn.onclick = () => alert("Você já está na versão mais recente!");
            }
        }

        function iniciarInstalacao() {
            document.getElementById('installer-screen').style.display = "flex";
            let progresso = 0;
            const barra = document.getElementById('setup-progress');
            const log = document.getElementById('setup-logs');
            const acao = document.getElementById('installer-current-action');

            log.innerHTML = "> Iniciando transferência...";

            const intervalo = setInterval(() => {
                progresso += 2;
                barra.style.width = progresso + "%";

                if(progresso == 20) { 
                    acao.innerText = "Extraindo arquivos..."; 
                    log.innerHTML += "<br>> Unpacking assets..."; 
                }
                if(progresso == 60) { 
                    acao.innerText = "Configurando engine..."; 
                    log.innerHTML += "<br>> Setting up GDI+ components..."; 
                }
                if(progresso == 85) { 
                    acao.innerText = "Finalizando instalação..."; 
                    log.innerHTML += "<br>> Cleaning temporary files..."; 
                }
                
                if (progresso >= 100) {
                    clearInterval(intervalo);
                    localStorage.setItem('roblox_installed', 'true');
                    
                    setTimeout(() => {
                        document.getElementById('installer-screen').style.display = "none";
                        alert("Instalação concluída! O download do arquivo começará agora.");
                        
                        // Inicia o download real do arquivo
                        dispararDownloadReal();
                        
                        atualizarUI();
                    }, 500);
                }
            }, 50);
        }

        function dispararDownloadReal() {
            const link = document.createElement('a');
            // O caminho assume que o arquivo está na mesma pasta do HTML no GitHub
            link.href = nomeDoSetupParaBaixar;
            link.download = nomeDoSetupParaBaixar;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Executa a verificação ao carregar a página
        window.onload = atualizarUI;
    </script>
</body>
    </html>
