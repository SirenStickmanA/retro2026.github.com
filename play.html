<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ROBLOX.com - Play Classic</title>
    <style>
        body { background-color: #000; color: #FFF; font-family: Verdana, sans-serif; margin: 0; padding: 0; text-align: center; overflow: hidden; }
        .game-window { width: 100vw; height: 85vh; background: #222; border-bottom: 3px solid #ff0000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .control-bar { height: 15vh; background: #111; padding: 10px; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Janela de renderização do Jogo -->
    <div class="game-window" id="viewport">
        [ Carregando Mapa de 2006 pelo Client... ]
    </div>

    <!-- Frame inferior que puxa os controles com base no aparelho -->
    <div class="control-bar">
        <iframe id="control-frame" src=""></iframe>
    </div>

    <script>
        // Pega o nome do jogo clicado na URL (ex: play.html?game=Chaos%20Canyon)
        const params = new URLSearchParams(window.location.search);
        const nomeJogo = params.get('game') || "ROBLOX Place";
        document.getElementById('viewport').innerText = `REROUTING CLIENT TO: ${nomeJogo}...`;

        // Lógica CaBlox de detecção de dispositivo
        const ua = navigator.userAgent;
        let controlPage = "controlpc.html"; // Padrão PC/Notebook

        // Correção aplicada aqui de controlmobipe para controlmobile
        if (/Mobi|Android|iPhone|iPad|Tablet/i.test(ua)) {
            controlPage = "controlmobile.html"; // Celular e Tablets
        }

        // Injeta a página correta dentro do frame inferior
        document.getElementById('control-frame').src = controlPage;
    </script>
</body>
  </html>
